<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Knowledge Wiki Ecosystem</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --sidebar-bg: #161b22; --content-bg: #0d1117;
    --border: #21262d; --accent: #58a6ff; --text: #c9d1d9; --heading: #f0f6fc;
  }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
  #main-content { flex: 1; padding: 30px; overflow-y: auto; background: var(--content-bg); }
  #graph-panel { width: 300px; border-left: 1px solid var(--border); background: var(--sidebar-bg); padding: 15px; }
  .menu-item { padding: 10px; margin: 5px 0; background: #21262d; cursor: pointer; border-radius: 6px; }
  .menu-item:hover { background: var(--accent); color: #000; }
  .graph-box { width: 100%; height: 250px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; margin-top: 15px; position: relative; }
  .node-dot { display: inline-block; width: 10px; height: 10px; background: #3fb950; border-radius: 50%; margin-right: 5px; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>📚 지식 위키 저장소</h2>
  <hr style="margin: 15px 0; border-color: var(--border);">
  <div id="menu-list">로딩 중...</div>
</div>

<div id="main-content">
  <h1 id="wiki-title">위키 메인 대시보드</h1>
  <p id="wiki-subtitle" style="color: #8b949e; margin-bottom: 20px;">페이지를 선택하거나 새 자료를 투입하세요.</p>
  <div id="wiki-body">하네스 에이전트 인프라가 실시간 가동 중입니다.</div>
</div>

<div id="graph-panel">
  <h3>📊 지식 관계 시각화 토폴로지</h3>
  <div class="graph-box" id="viz-container">
    <div style="padding: 10px; font-size: 12px; color: #8b949e;">에이전트가 자동 매핑한 토폴로지 관계도:</div>
    <div id="graph-nodes" style="padding: 10px;"></div>
  </div>
</div>

<script>
  async function loadWiki() {
    const res = await fetch('/api/wiki');
    const data = await res.json();
    const menuList = document.getElementById('menu-list');
    menuList.innerHTML = '';
    
    Object.keys(data).forEach(key => {
      const p = data[key];
      const div = document.createElement('div');
      div.className = 'menu-item';
      div.innerText = p.title;
      div.onclick = () => {
        document.getElementById('wiki-title').innerText = p.title;
        document.getElementById('wiki-subtitle').innerText = p.subtitle;
        document.getElementById('wiki-body').innerHTML = p.content;
      };
      menuList.appendChild(div);
    });

    // 그래프 렌더링용 단순 뷰어 데이터 매핑
    const graphRes = await fetch('/api/graph');
    const graphData = await graphRes.json();
    const gContainer = document.getElementById('graph-nodes');
    gContainer.innerHTML = graphData.nodes.map(n => `<div style="font-size:13px; margin:4px 0;"><span class="node-dot"></span>${n.label}</div>`).join('');
  }
  
  window.onload = loadWiki;
</script>
</body>
</html>
